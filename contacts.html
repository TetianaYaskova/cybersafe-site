<!DOCTYPE html>
<html>
<head>
    <title>Контакти CyberSafe</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        #contact-info { display: none; } /* спочатку приховуємо контакти */
    </style>
</head>
<body>
    <h1>Проходьте перевірку reCAPTCHA</h1>

    <!-- Блок reCAPTCHA -->
    <div class="g-recaptcha" data-sitekey="6LdDFHwsAAAAAO3WWVKXXpVrVIYpSWTtoClbxUy1" data-callback="recaptchaSuccess"></div>

    <!-- Кнопка для демонстрації -->
    <p id="recaptcha-message"></p>

    <!-- Контакти -->
    <div id="contact-info">
        <h1>Контакти</h1>
        <p>Email: info@cybersafe-test.com</p>
        <p>Телефон: +380000000000</p>
    </div>

    <script>
        function recaptchaSuccess(token) {
            // reCAPTCHA пройдена
            document.getElementById('contact-info').style.display = 'block';
            document.getElementById('recaptcha-message').innerText = "Перевірка пройдена! Ось контакти:";
        }
    </script>
</body>
</html>
